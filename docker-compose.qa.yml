services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    shm_size: "512mb"
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c synchronous_commit=off
        -c wal_buffers=16MB
        -c max_wal_size=2GB
        -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-log-volume-init:
    image: alpine:3.21
    command:
      [
        "sh",
        "-c",
        "mkdir -p /var/log/ledgerlight && chown -R 1001:65533 /var/log/ledgerlight && chmod 775 /var/log/ledgerlight",
      ]
    volumes:
      - backend_logs:/var/log/ledgerlight
    restart: "no"

  backend:
    environment:
      NODE_ENV: production
      OTEL_SERVICE_NAME: ledger-light-backend
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      LOG_FILE_PATH: /var/log/ledgerlight/backend.ndjson
      DB_SLOW_QUERY_THRESHOLD_MS: 250
    volumes:
      - backend_logs:/var/log/ledgerlight
    depends_on:
      db:
        condition: service_healthy
      backend-log-volume-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  migrate:
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - backend_logs:/var/log/ledgerlight:ro
    ports:
      - "4318:4318"
    depends_on:
      backend-log-volume-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - postgres-exporter
      - otel-collector

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  backend_logs:
  grafana_data:
