receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
  filelog:
    include:
      - /var/log/ledgerlight/*.ndjson
    start_at: beginning
    include_file_path: true
    operators:
      - type: json_parser
        parse_from: body

processors:
  batch:
  resource/logs:
    attributes:
      - action: upsert
        key: service.name
        value: ledger-light-backend
      - action: upsert
        key: deployment.environment
        value: qa

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo]
    logs:
      receivers: [filelog]
      processors: [resource/logs, batch]
      exporters: [loki]
