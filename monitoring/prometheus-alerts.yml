groups:
  - name: ledgerlight-qa-observability
    rules:
      - alert: LedgerLightHigh5xxRate
        expr: sum(rate(ledgerlight_http_errors_total{status_class="5xx"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Backend 5xx rate is above the QA baseline
          description: Inspect Grafana request/error dashboards, then correlate with backend logs and traces.

      - alert: LedgerLightHighP95Latency
        expr: histogram_quantile(0.95, sum(rate(ledgerlight_http_request_duration_seconds_bucket[5m])) by (le, route)) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: P95 latency is above 500ms on at least one route
          description: Review slow routes in Grafana and inspect matching Tempo traces.

      - alert: LedgerLightAuthRefreshFailureSpike
        expr: increase(ledgerlight_auth_failures_total{operation="refresh"}[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Refresh failures are spiking
          description: Check auth middleware behavior, backend auth logs, and refresh traces.

      - alert: LedgerLightMetricsTargetDown
        expr: up{job=~"backend|postgres-exporter|otel-collector"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: A monitoring target is down
          description: Verify the QA compose stack and inspect the affected service logs.

      - alert: LedgerLightPostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL deadlocks detected
          description: Review active locks, slow queries, and recent write-heavy traces.
